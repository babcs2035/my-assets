[tools]
node = "latest"
pnpm = "latest"

[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[tasks.setup]
description = "Setup development environment (Create .env, Install deps, Start DB, Migrate & Seed)"
depends = []
run = [
  "cp -n .env.example .env || true",
  "rm -rf node_modules",
  "pnpm install",
  "docker compose down --remove-orphans",
  "docker compose up -d db --wait",
  "pnpm prisma migrate dev --name init",
  "pnpm prisma generate",
  "pnpm prisma db seed",
  "mise run setup:secrets"
]

[tasks."setup:secrets"]
description = "Generate OP_SECRETS_FILE for local debugging (reads from 1Password CLI)"
run = "bash scripts/generate-op-secrets.sh"

[tasks.dev]
description = "Start development server"
depends = ["install"]
run = "pnpm dev"

[tasks.build]
description = "Build application"
depends = ["install"]
run = "pnpm build"

[tasks.start]
description = "Start production server"
depends = ["build"]
run = "pnpm start"

[tasks.check]
description = "Run type check and linter"
depends = ["install"]
run = "pnpm check"

[tasks.format]
description = "Format code with Biome"
depends = ["install"]
run = "pnpm biome format --write src"

[tasks."lint:fix"]
description = "Lint and fix code with Biome"
depends = ["install"]
run = "pnpm biome check --write --unsafe src"

[tasks."db:up"]
description = "Start database container"
run = "docker compose up -d"

[tasks."db:down"]
description = "Stop database container"
run = "docker compose down"

[tasks."db:reset"]
description = "Reset database (wipe data and re-seed)"
depends = ["install"]
run = [
  "pnpm prisma migrate reset --force",
  "pnpm prisma db seed"
]

[tasks."db:studio"]
description = "Open Prisma Studio"
depends = ["install"]
run = "pnpm prisma studio"

[tasks."docker:build"]
description = "Build app and db containers with docker compose"
run = "docker compose build"

[tasks."docker:up"]
description = "Start app stack (app + db) with docker compose"
run = "docker compose up -d --remove-orphans"

[tasks."docker:down"]
description = "Stop app stack containers"
run = "docker compose down"

[tasks."docker:logs"]
description = "Show app stack logs"
run = "docker compose logs -f --tail=200"

[tasks.sync]
description = "Run scrapers manually"
depends = ["install"]
run = "pnpm tsx src/scripts/sync.ts"
