name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Log in to the Container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/babcs2035/my-assets:latest, ${{ env.REGISTRY }}/babcs2035/my-assets:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Upload compose file
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          target: ${{ secrets.DEPLOY_TARGET }}
          source: "docker-compose.production.yml"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

            cd "${{ secrets.DEPLOY_TARGET }}"
            mv docker-compose.production.yml docker-compose.yml

            if [ ! -f .env ]; then
              echo ".env is missing in deploy target: ${{ secrets.DEPLOY_TARGET }}" >&2
              exit 1
            fi

            if ! grep -q '^POSTGRES_PASSWORD=' .env || [ -z "$(grep '^POSTGRES_PASSWORD=' .env | tail -n1 | cut -d= -f2-)" ]; then
              echo "POSTGRES_PASSWORD is required in deploy .env." >&2
              exit 1
            fi

            set -a
            . ./.env
            set +a

            APP_PORT_VALUE="${APP_PORT:-3000}"

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${APP_PORT_VALUE}/" >/dev/null; then
                echo "Health check passed: my-assets-app"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health check failed: my-assets-app"
                docker compose ps
                docker compose logs --tail=120
                exit 1
              fi
              sleep 3
            done

            if ! docker compose ps --status running | grep -q "my-assets-app"; then
              echo "Container is not running: my-assets-app"
              docker compose ps
              exit 1
            fi

            docker image prune -f
