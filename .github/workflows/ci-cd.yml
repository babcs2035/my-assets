name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  ci-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup mise
        uses: jdx/mise-action@main
        with:
          install: true

      - name: Prepare environment variables
        run: cp .env.example .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Format & Lint Check with Biome
        run: pnpm biome ci ./src

      - name: Run Type Check
        run: pnpm tsc --noEmit

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-checks
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v8.1.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          platforms:
            - linux/arm64
            - linux/amd64
          tags: ghcr.io/babcs2035/my-assets:latest,ghcr.io/babcs2035/my-assets:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Upload compose file
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          target: ${{ secrets.DEPLOY_TARGET }}
          source: "docker-compose.production.yml"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

            cd "${{ secrets.DEPLOY_TARGET }}"
            mv docker-compose.production.yml docker-compose.yml

            if [ ! -f .env ]; then
              echo ".env is missing in deploy target: ${{ secrets.DEPLOY_TARGET }}" >&2
              exit 1
            fi

            if ! grep -q '^POSTGRES_PASSWORD=' .env || [ -z "$(grep '^POSTGRES_PASSWORD=' .env | tail -n1 | cut -d= -f2-)" ]; then
              echo "POSTGRES_PASSWORD is required in deploy .env." >&2
              exit 1
            fi

            if ! grep -q '^DATABASE_URL=' .env || [ -z "$(grep '^DATABASE_URL=' .env | tail -n1 | cut -d= -f2-)" ]; then
              echo "DATABASE_URL is required in deploy .env." >&2
              exit 1
            fi

            set -a
            . ./.env
            set +a

            if [ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
              echo "OP_SERVICE_ACCOUNT_TOKEN is required in deploy .env." >&2
              exit 1
            fi

            if ! command -v op >/dev/null 2>&1; then
              echo "op command not found on deploy host. Install 1Password CLI on host." >&2
              exit 1
            fi

            mkdir -p data/runtime

            export OP_VAULT="${OP_VAULT:-}"

            python3 -c '
            import json, os, subprocess

            OP_VAULT_VALUE = os.environ.get("OP_VAULT", "")
            OP_MF_ITEM_ID_RAW = os.environ.get("OP_MF_ITEM_ID", "MF_Main")

            # Split comma-separated item IDs, trim whitespace, filter empty
            item_ids = [
                x.strip()
                for x in OP_MF_ITEM_ID_RAW.split(",")
                if x.strip()
            ]
            if not item_ids:
                item_ids = ["MF_Main"]

            def extract_item(item_id: str, vault: str) -> dict:
                cmd = ["op", "item", "get", item_id]
                if vault:
                    cmd.extend(["--vault", vault])
                cmd.append("--reveal")
                cmd.extend(["--format", "json"])
                result = subprocess.run(cmd, capture_output=True, text=True)
                if result.returncode != 0:
                    print(f"  Warning: Failed to get item {item_id}: {result.stderr.strip()}", flush=True)
                    return {}

                item = json.loads(result.stdout)
                fields_dict = {}
                otp_uri = None
                label = ""

                # Debug: log all field labels and types (values hidden for security)
                for field in item.get("fields", []):
                    print(f"  Field: label={field.get('label')}, type={field.get('type')}", flush=True)

                for field in item.get("fields", []):
                    label = str(field.get("label", "")).strip().lower()
                    ftype = str(field.get("type", "")).strip().upper()
                    value = field.get("value")

                    if ftype == "PASSWORD" and str(field.get("purpose", "")).lower() != "otp":
                        fields_dict["password"] = str(value) if value else None
                    elif label == "username" or label == "email" or label == "acct_id":
                        fields_dict["username"] = str(value) if value else None

                    if ftype == "OTP" and isinstance(value, str):
                        otp_uri = value
                    elif label in ("otp", "totp") and isinstance(value, str) and value.startswith("otpauth://"):
                        otp_uri = value

                # Fallback: if no PASSWORD type field found, use label-based matching
                if "password" not in fields_dict:
                    for field in item.get("fields", []):
                        label = str(field.get("label", "")).strip().lower()
                        value = field.get("value")
                        if label == "password" and value is not None:
                            fields_dict["password"] = str(value)
                            break

                if otp_uri:
                    fields_dict["otp_uri"] = otp_uri

                return {k: v for k, v in fields_dict.items() if v is not None}

            items = {}
            for item_id in item_ids:
                print(f"Fetching item {item_id} from 1Password...", flush=True)
                mf = extract_item(item_id, OP_VAULT_VALUE)
                if mf:
                    items[item_id] = mf
                    print(f"  Got: {list(mf.keys())}", flush=True)
                else:
                    print(f"  WARNING: MF item {item_id} is empty!", flush=True)

            payload = {"items": items}
            with open("data/runtime/op-secrets.json", "w", encoding="utf-8") as f:
                json.dump(payload, f, ensure_ascii=False)

            os.chmod("data/runtime/op-secrets.json", 0o644)
            print(f"Saved op-secrets.json with items: {list(items.keys())}", flush=True)
            '

            docker compose pull --quiet || true

            # Apply database migrations explicitly before starting the app
            echo "Applying database migrations..."
            set -a
            . ./.env
            set +a
            docker compose run --rm app prisma migrate deploy
            MIGRATE_EXIT=$?
            if [ $MIGRATE_EXIT -ne 0 ]; then
              echo "ERROR: Database migration failed with exit code $MIGRATE_EXIT" >&2
              echo "Aborting deploy." >&2
              exit $MIGRATE_EXIT
            fi
            echo "Database migrations applied successfully."

            docker compose up -d --force-recreate --remove-orphans

            if ! docker compose ps --status running | grep -q "my-assets-app"; then
              echo "Container is not running: my-assets-app"
              docker compose ps
              exit 1
            fi
